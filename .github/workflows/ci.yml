name: CI

on:
  # Self-trust 모델: 본인/Developer subagent 의 main 직접 push 는 CI skip.
  # 661 workflow runs (혼자 개발 누적) — CI wait 가 사용자 working memory fragmenting
  # → plan 누적/sibling 발견의 진짜 root cause. 외부 contributor PR + release tag
  # (build.yml: tags v*.*.*) 만 검증. 자세한 의도 + revert 절차:
  # docs/plans/selfTrustCiTriggerOptimizationPlan_2026-04-25.md
  pull_request:
    branches: [main]
    # Docs-only / markdown-only changes (agent role docs, plans, READMEs) do
    # not affect the build or tests. Skip CI to free the self-hosted runner.
    # Any change under src/, src-tauri/, package.json, lockfiles, or this
    # workflow itself still triggers the full suite.
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'

# Rust and frontend jobs are independent — splitting them lets failures
# surface faster and lets a retry target only the failed half. Both run on
# the same self-hosted Linux runner (10× cost vs GitHub-hosted macOS was the
# original motivation to move off macos-latest).
jobs:
  rust-check:
    runs-on: [self-hosted, Linux]
    # Runner prerequisite: Tauri 2 Linux build deps pre-installed on host
    # (libwebkit2gtk-4.1-dev, libjavascriptcoregtk-4.1-dev, libsoup-3.0-dev,
    # libappindicator3-dev, librsvg2-dev, patchelf, build-essential, pkg-config).
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Create sidecar placeholders
        # Tauri's build script resolves sidecar paths against the CURRENT
        # target triple (TAURI_ENV_TARGET_TRIPLE). On Linux self-hosted CI
        # that's x86_64-unknown-linux-gnu, not aarch64-apple-darwin — so we
        # create stubs for both the macOS name (kept for config validation
        # safety) and the host target. Content is never executed on this
        # Linux-only check job; only file existence matters.
        run: |
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's/^host: //p')
          for name in rawq crg chub; do
            touch "src-tauri/binaries/${name}-aarch64-apple-darwin"
            chmod +x "src-tauri/binaries/${name}-aarch64-apple-darwin"
            touch "src-tauri/binaries/${name}-${TRIPLE}"
            chmod +x "src-tauri/binaries/${name}-${TRIPLE}"
          done

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test --lib

  frontend-check:
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Frontend tests
        run: npx vitest run

      - name: Vite build
        run: npx vite build
