name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Release track (lite=rawq only, full=all bundled, both)'
        required: true
        default: 'lite'
        type: choice
        options: [lite, full, both]

# tauri-action needs contents:write to upload DMG/app artifacts to the Release.
permissions:
  contents: write

env:
  RUST_BACKTRACE: 1

# ─────────────────────────────────────────
# Helpers
# ─────────────────────────────────────────
# track_lite:  always true (lite runs on every tag push)
# track_full:  true when input=full or input=both (manual dispatch)

jobs:

  # ── 1. rawq sidecar ──────────────────────────────────────────────────────────
  build-rawq:
    name: rawq (${{ matrix.triple }})
    strategy:
      matrix:
        include:
          - runner: macos-latest
            triple: aarch64-apple-darwin
            ext: ''
          - runner: windows-latest
            triple: x86_64-pc-windows-msvc
            ext: '.exe'
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: rawq-${{ matrix.triple }}

      - name: Clone rawq source
        run: git clone https://github.com/auyelbekov/rawq vendor/rawq

      - name: Build rawq
        shell: bash
        run: |
          cargo build \
            --manifest-path vendor/rawq/Cargo.toml \
            --release \
            --target-dir vendor/rawq/target
          mkdir -p src-tauri/binaries
          cp vendor/rawq/target/release/rawq${{ matrix.ext }} \
             src-tauri/binaries/rawq-${{ matrix.triple }}${{ matrix.ext }}
          chmod +x src-tauri/binaries/rawq-${{ matrix.triple }}${{ matrix.ext }} || true

      - uses: actions/upload-artifact@v4
        with:
          name: rawq-${{ matrix.triple }}
          path: src-tauri/binaries/rawq-${{ matrix.triple }}${{ matrix.ext }}
          retention-days: 1

  # ── 2. code-review-graph sidecar (Full track only) ───────────────────────────
  build-crg:
    name: code-review-graph (${{ matrix.triple }})
    if: |
      github.event_name == 'workflow_dispatch' &&
      (inputs.track == 'full' || inputs.track == 'both')
    strategy:
      matrix:
        include:
          - runner: macos-latest
            triple: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone code-review-graph
        run: git clone https://github.com/tirth8205/code-review-graph vendor/crg

      - name: Install & bundle with PyInstaller
        run: |
          cd vendor/crg
          pip install --quiet . pyinstaller
          # Find the CLI entry point (adjust if package structure differs)
          ENTRY=$(python -c "
          import subprocess, sys
          r = subprocess.run(['python','-m','code_review_graph','--version'],
                             capture_output=True)
          # If above works, use module entry
          print('-m code_review_graph')
          " 2>/dev/null || echo "")
          pyinstaller \
            --onefile \
            --name crg-${{ matrix.triple }} \
            --distpath ../../src-tauri/binaries \
            $(python -c "
          import code_review_graph, os
          pkg = os.path.dirname(code_review_graph.__file__)
          for f in ['__main__.py','cli.py','main.py']:
              p = os.path.join(pkg, f)
              if os.path.exists(p): print(p); break
          ")
          chmod +x ../../src-tauri/binaries/crg-${{ matrix.triple }}

      - uses: actions/upload-artifact@v4
        with:
          name: crg-${{ matrix.triple }}
          path: src-tauri/binaries/crg-${{ matrix.triple }}
          retention-days: 1

  # ── 3. context-hub (chub) sidecar (Full track only) ──────────────────────────
  build-chub:
    name: context-hub (${{ matrix.triple }})
    if: |
      github.event_name == 'workflow_dispatch' &&
      (inputs.track == 'full' || inputs.track == 'both')
    strategy:
      matrix:
        include:
          - runner: macos-latest
            triple: aarch64-apple-darwin
            pkg_target: node18-macos-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Clone context-hub
        run: git clone https://github.com/andrewyng/context-hub vendor/chub

      - name: Build with pkg
        run: |
          npm install -g @vercel/pkg
          cd vendor/chub
          npm install --prefix cli
          pkg cli \
            --targets ${{ matrix.pkg_target }} \
            --output ../../src-tauri/binaries/chub-${{ matrix.triple }}
          chmod +x ../../src-tauri/binaries/chub-${{ matrix.triple }}

      - uses: actions/upload-artifact@v4
        with:
          name: chub-${{ matrix.triple }}
          path: src-tauri/binaries/chub-${{ matrix.triple }}
          retention-days: 1

  # ── 4. Tauri Lite build ───────────────────────────────────────────────────────
  build-tauri-lite:
    name: Tauri Lite (${{ matrix.runner }})
    needs: [build-rawq]
    strategy:
      matrix:
        include:
          - runner: macos-latest
            triple: aarch64-apple-darwin
            ext: ''
          - runner: windows-latest
            triple: x86_64-pc-windows-msvc
            ext: '.exe'
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download rawq sidecar
        uses: actions/download-artifact@v4
        with:
          name: rawq-${{ matrix.triple }}
          path: src-tauri/binaries

      - name: Set sidecar permissions
        if: matrix.runner != 'windows-latest'
        run: chmod +x src-tauri/binaries/rawq-${{ matrix.triple }}${{ matrix.ext }}

      # rawqSidecarReleaseGapPlan_2026-04-26 Layer C1: tauri-action 직전에
      # download-artifact 결과를 확인. artifact 누락 / 권한 누락 시 즉시 실패
      # → release upload 이전 단계에서 회귀 차단.
      - name: Verify rawq sidecar staged for tauri-action
        shell: bash
        run: |
          ls -la src-tauri/binaries
          SIDECAR="src-tauri/binaries/rawq-${{ matrix.triple }}${{ matrix.ext }}"
          if [[ ! -f "$SIDECAR" ]]; then
            echo "::error::rawq sidecar missing: $SIDECAR"
            exit 1
          fi
          if [[ "${{ matrix.runner }}" != "windows-latest" && ! -x "$SIDECAR" ]]; then
            echo "::error::rawq sidecar not executable: $SIDECAR"
            exit 1
          fi
          echo "rawq sidecar staged OK: $SIDECAR"

      - name: npm install
        run: npm install --no-audit --no-fund

      - name: Extract version from tag
        shell: bash
        run: |
          # tag push 면 ref_name 은 v0.1.x-beta, prefix v 제거.
          # workflow_dispatch 면 ref_name = main → tauri 가 semver reject 하므로
          # package.json 의 default version 사용 (smoke test 용도).
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      # Windows shell escape 가 multiline `--config '{...}'` JSON 을 깨뜨림
       # ('error: invalid value '{' for --config'). macOS signingIdentity / externalBin
      # 모두 tauri.conf.json 의 영구 설정으로 이전. version 은 release 전에 manifest
      # bump (CHANGELOG + package.json + Cargo.toml + tauri.conf.json) 패턴 유지.
      - name: Build & release (Lite)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # workflow_dispatch 시 tagName 빈 값 → tauri-action 이 release 생성 skip,
          # artifact 빌드만 (smoke test 용). tag push 만 release upload.
          tagName: ${{ github.event_name == 'push' && github.ref_name || '' }}
          releaseName: 'tunaFlow ${{ github.ref_name }}'
          releaseBody: |
            ## Lite 트랙 (rawq 번들)

            code-review-graph와 context-hub는 첫 실행 시 자동 설치됩니다.

            ### 설치 (macOS)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/hang-in/tunaFlow/main/install.sh | bash
            ```

            ### 설치 (Windows)
            NSIS installer (`tunaFlow_*_x64-setup.exe`) 다운로드 후 실행.

            - **SmartScreen** 경고: "추가 정보" → "실행" (베타 서명 없음)
            - **백신 차단** (Defender / Avast / 알약): false positive 가능 — 격리함에서 복원 또는 `%LOCALAPPDATA%\tunaFlow` 예외 경로 추가
            - **WebView2** 없을 시 installer 가 자동 다운로드

            상세 안내: [INSTALL.md](https://github.com/hang-in/tunaFlow/blob/main/INSTALL.md)

            ### macOS Gatekeeper 우회 (베타 서명 없음)
            `install.sh`가 자동으로 처리합니다. 수동으로 하려면:
            ```bash
            xattr -cr /Applications/tunaFlow.app
            ```
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}

      # rawqSidecarReleaseGapPlan_2026-04-26 Layer C1: 빌드 산출물 (.app) 안의
      # sidecar 가 실제로 들어갔는지 검증. Tauri 가 externalBin staging 을
      # 무시하거나 strip 동작이 회귀하면 즉시 실패. macOS 만 — Windows
      # NSIS installer 는 별도 layout (`%LOCALAPPDATA%\tunaFlow\rawq.exe`)
      # 이라 같은 식으로 검사하지 않는다.
      - name: Verify rawq sidecar in built bundle (macOS)
        if: matrix.runner == 'macos-latest'
        shell: bash
        run: |
          APP_PATH=$(find src-tauri/target -type d -name 'tunaFlow.app' | head -1)
          if [[ -z "$APP_PATH" ]]; then
            echo "::error::tunaFlow.app not found under src-tauri/target"
            exit 1
          fi
          echo "Found .app: $APP_PATH"
          find "$APP_PATH" -name 'rawq*' -ls
          # 번들 안 sidecar 는 Tauri 가 strip 한 'rawq' (no triple suffix) 또는
          # triple 그대로 — 둘 중 하나는 반드시 존재 + 실행권한.
          MATCHES=$(find "$APP_PATH" \( -name 'rawq' -o -name 'rawq-*' \) -perm -u+x)
          if [[ -z "$MATCHES" ]]; then
            echo "::error::rawq sidecar missing in built .app bundle"
            exit 1
          fi
          echo "rawq sidecar verified in bundle:"
          echo "$MATCHES"

  # ── 5. Tauri Full build ───────────────────────────────────────────────────────
  build-tauri-full:
    name: Tauri Full (${{ matrix.runner }})
    needs: [build-rawq, build-crg, build-chub]
    if: |
      github.event_name == 'workflow_dispatch' &&
      (inputs.track == 'full' || inputs.track == 'both')
    strategy:
      matrix:
        include:
          - runner: macos-latest
            triple: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download sidecars
        uses: actions/download-artifact@v4
        with:
          pattern: '*-${{ matrix.triple }}'
          path: src-tauri/binaries
          merge-multiple: true

      - name: Set sidecar permissions
        run: |
          chmod +x src-tauri/binaries/rawq-${{ matrix.triple }}
          chmod +x src-tauri/binaries/crg-${{ matrix.triple }}
          chmod +x src-tauri/binaries/chub-${{ matrix.triple }}

      - name: npm install
        run: npm install --no-audit --no-fund

      - name: Extract version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build & release (Full)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}-full
          releaseName: 'tunaFlow ${{ github.ref_name }} (Full)'
          releaseBody: |
            ## Full 트랙 (모든 의존성 번들)

            rawq, code-review-graph, context-hub 모두 번들. Python/Node 설치 불필요.

            ### 설치
            ```bash
            curl -fsSL https://raw.githubusercontent.com/hang-in/tunaFlow/main/install.sh | bash -s -- --full
            ```

            ### Gatekeeper 우회 (베타 서명 없음)
            `install.sh`가 자동으로 처리합니다.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          args: >-
            --config '{
              "version":"${{ env.VERSION }}",
              "bundle":{
                "macOS":{"signingIdentity":"-"},
                "externalBin":["binaries/rawq","binaries/crg","binaries/chub"]
              }
            }'
